name: Publish to MCP Registry

# Publishes server.json to the Official MCP Registry using GitHub Actions OIDC
# (no interactive device login). The io.github.devchad-cmd/* namespace is
# authorized by this repo's OIDC token. Run manually (gh workflow run
# registry-publish.yml) — the tag-triggered publish.yml also does this after npm.
#
# Prereq: the npm `skilldb` package at server.json's version must already be live
# with a matching `mcpName` (the registry validates against it).

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for GitHub OIDC login to the registry

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Authenticate the API call — anonymous api.github.com requests are
          # rate-limited and return 403 on shared runner IPs.
          URL=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/modelcontextprotocol/registry/releases/latest \
            | jq -r '.assets[] | select(.name|test("linux_amd64.*tar\\.gz$")) | .browser_download_url' | head -1)
          echo "Downloading mcp-publisher: $URL"
          test -n "$URL"
          curl -fsSL "$URL" -o mcp-publisher.tar.gz
          tar xzf mcp-publisher.tar.gz
          chmod +x mcp-publisher
          ./mcp-publisher --help 2>&1 | head -20 || true

      - name: Login (GitHub OIDC) + publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      - name: Verify
        run: |
          echo "=== registry search=skilldb ==="
          curl -s "https://registry.modelcontextprotocol.io/v0/servers?search=skilldb" | head -c 800
